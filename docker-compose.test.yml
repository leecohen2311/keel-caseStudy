# Throwaway Postgres for the test suite. Same image and role init as the real
# compose file; data on tmpfs so every `npm test` starts clean.
services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d billing"]
      interval: 1s
      timeout: 3s
      retries: 30
